name: winefeed auto-update

# Runs the fetcher twice a day, regenerates index.html, commits it.
# GitHub Pages then serves the repo (Settings -> Pages -> deploy from main / root).
on:
  schedule:
    - cron: "30 6 * * *"    # once daily, 06:30 UTC
  workflow_dispatch: {}      # allow manual "Run workflow"

permissions:
  contents: write

concurrency:
  group: winefeed-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch feeds, draft takeaways, regenerate site
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 update.py

      - name: Render daily brief email + push Klaviyo DRAFT (never sends)
        env:
          KLAVIYO_PRIVATE_KEY: ${{ secrets.KLAVIYO_PRIVATE_KEY }}
        run: |
          python3 email_brief.py
          python3 email_push.py

      - name: Commit refreshed page
        run: |
          git config user.name  "winefeed-bot"
          git config user.email "actions@github.com"
          git add index.html feed_data.json winefeed_artifact.html
          if git diff --staged --quiet; then
            echo "No changes this run."
          else
            git commit -m "auto: refresh feed $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
