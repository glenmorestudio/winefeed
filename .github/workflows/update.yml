name: winefeed auto-update

# Runs the fetcher twice a day, regenerates index.html, commits it.
# GitHub Pages then serves the repo (Settings -> Pages -> deploy from main / root).
on:
  schedule:
    - cron: "30 6 * * *"    # 06:30 UTC (~morning)
    - cron: "30 18 * * *"   # 18:30 UTC (~evening)
  workflow_dispatch: {}      # allow manual "Run workflow"

permissions:
  contents: write

concurrency:
  group: winefeed-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch feeds and regenerate site
        run: python3 update.py

      - name: Commit refreshed page
        run: |
          git config user.name  "winefeed-bot"
          git config user.email "actions@github.com"
          git add index.html feed_data.json winefeed_artifact.html
          if git diff --staged --quiet; then
            echo "No changes this run."
          else
            git commit -m "auto: refresh feed $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
